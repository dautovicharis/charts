version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/docs/docs-app"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"
