name: Publish Docs Static

on:
  workflow_dispatch:
    inputs:
      playground_bundle:
        description: "Playground bundle mode"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: docs-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-docs-static:
    name: Build and Publish docs/static to charts-docs
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'HDCharts' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Resolve charts version from Axion
        id: version
        shell: bash
        run: |
          set -euo pipefail
          charts_version=$(./gradlew -q currentVersion \
            | tail -n 1 \
            | sed -E 's/^Project version: //' \
            | tr -d '\r' \
            | xargs)
          if [[ -z "${charts_version:-}" ]]; then
            echo "Failed to resolve version from Axion currentVersion task." >&2
            exit 1
          fi
          echo "charts_version=${charts_version}" >> "$GITHUB_OUTPUT"
          echo "Config chartsVersion: ${charts_version}"

      - name: Build docs static assets
        shell: bash
        run: |
          set -euo pipefail

          playground_task="playground"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.playground_bundle }}" == "prod" ]]; then
            playground_task=":playground:jsBrowserDistribution"
          fi

          echo "Using playground task: ${playground_task}"
          ./gradlew generateDocs "${playground_task}" --no-daemon

      - name: Validate required docs static files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "docs/static/demo/snapshot/index.html"
            "docs/static/playground/snapshot/index.html"
          )
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file" >&2
              exit 1
            fi
          done

      - name: Checkout charts-docs repository
        uses: actions/checkout@v4
        with:
          repository: HDCharts/charts-docs
          token: ${{ secrets.CHARTS_DOCS_PUSH_TOKEN }}
          fetch-depth: 0
          path: charts-docs-repo

      - name: Sync generated static assets into charts-docs workspace
        shell: bash
        run: |
          set -euo pipefail
          git -C charts-docs-repo fetch origin docs-static
          git -C charts-docs-repo checkout origin/docs-static -- static
          rsync -a docs/static/ charts-docs-repo/static/

      - name: Validate docs release links against built static assets
        shell: bash
        run: |
          set -euo pipefail
          DOCS_RELEASE_LINKS_ASSET_ROOT="${PWD}/charts-docs-repo/static" \
            bash charts-docs-repo/scripts/test-docs-release-assets.sh

      - name: Publish static assets to charts-docs/docs-static
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.charts_version }}
        shell: bash
        run: |
          set -euo pipefail
          git -C charts-docs-repo config user.name "github-actions[bot]"
          git -C charts-docs-repo config user.email "github-actions[bot]@users.noreply.github.com"
          CI=true CURRENT_VERSION="${CURRENT_VERSION}" bash charts-docs-repo/scripts/publish-docs-static.sh

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.CHARTS_DOCS_VERCEL_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VERCEL_DEPLOY_HOOK_URL:-}" ]]; then
            echo "Missing required secret: CHARTS_DOCS_VERCEL_DEPLOY_HOOK_URL" >&2
            echo "Disable Vercel automatic Git deploys and configure a deploy hook secret in GitHub Actions." >&2
            exit 1
          fi
          echo "Triggering Vercel deployment..."
          curl -fsS -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/tmp/vercel-deploy-hook-response.json
          sed -n '1,20p' /tmp/vercel-deploy-hook-response.json || true
