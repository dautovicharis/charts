name: Publish Docs Snapshot

on:
  workflow_dispatch:
  schedule:
    # Daily at 00:00 UTC.
    - cron: "0 0 * * *"

permissions:
  contents: read
  id-token: write

concurrency:
  group: docs-snapshot-s3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-docs-snapshot:
    name: Build and Publish docs/static snapshot to S3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'HDCharts' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Detect relevant changes
        id: changes
        env:
          DOCS_STATIC_BUCKET: ${{ vars.DOCS_STATIC_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DOCS_STATIC_BUCKET:-}" ]]; then
            echo "Missing required repository variable: DOCS_STATIC_BUCKET" >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          metadata_file="$(mktemp)"
          metadata_s3_uri="s3://${DOCS_STATIC_BUCKET}/static/_meta/charts-snapshot-publish.json"
          if ! aws s3 cp "${metadata_s3_uri}" "${metadata_file}" >/dev/null 2>&1; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="$(
            sed -nE 's/.*"source_sha"[[:space:]]*:[[:space:]]*"([0-9a-fA-F]{7,40})".*/\1/p' "${metadata_file}" \
              | head -n 1
          )"
          if [[ -z "${BASE:-}" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(
            git diff --name-only "${BASE}..HEAD" \
              | sed '/^[[:space:]]*$/d' \
              | sort -u
          )"

          if [[ -z "${files:-}" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          filtered="$(
            printf '%s\n' "${files}" \
              | grep -vE '(^\.github/|\.md$|^LICENSE$|^NOTICE$)' \
              || true
          )"
          if [[ -z "${filtered:-}" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Resolve charts version from Axion
        id: version
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          charts_version=$(./gradlew -q currentVersion \
            | awk 'NF {v=$NF} END {gsub(/\r/, "", v); print v}')
          if [[ -z "${charts_version:-}" ]]; then
            echo "Failed to resolve version from Axion currentVersion task." >&2
            exit 1
          fi
          if [[ "${charts_version}" != *"-SNAPSHOT" ]]; then
            echo "Snapshot workflow requires a -SNAPSHOT version, got: ${charts_version}" >&2
            exit 1
          fi
          echo "charts_version=${charts_version}" >> "$GITHUB_OUTPUT"

      - name: Build docs static assets
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew generateDocs playground --no-daemon --stacktrace --build-cache

      - name: Validate required docs static files
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "docs/static/api/snapshot/index.html"
            "docs/static/demo/snapshot/index.html"
            "docs/static/playground/snapshot/index.html"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file" >&2
              exit 1
            fi
          done

      - name: Checkout charts-docs repository
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: HDCharts/charts-docs
          fetch-depth: 1
          path: charts-docs-repo

      - name: Validate docs release link contract
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          bash charts-docs-repo/scripts/test-docs-release-links-contract.sh

      - name: Publish snapshot assets to S3
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        env:
          CHARTS_VERSION: ${{ steps.version.outputs.charts_version }}
          DOCS_STATIC_BUCKET: ${{ vars.DOCS_STATIC_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/publish-docs-to-s3.sh snapshot

      - name: Invalidate CloudFront cache
        if: ${{ steps.changes.outputs.has_changes == 'true' }}
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/invalidate-docs-cloudfront.sh snapshot
