name: PR Summary Comment

on:
  workflow_call:
    inputs:
      run_id:
        description: "Upstream workflow run ID that produced the summary artifact"
        required: true
        type: string
      artifact_name:
        description: "Artifact name to download from upstream run"
        required: true
        type: string
      artifact_dir:
        description: "Local directory where artifact will be downloaded"
        required: true
        type: string
      summary_file:
        description: "Summary markdown file name inside artifact_dir"
        required: true
        type: string
      marker:
        description: "Hidden marker used to upsert a single bot comment"
        required: true
        type: string

permissions:
  actions: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Download summary artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_dir }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PR number
        id: resolve_pr
        env:
          RUN_ID: ${{ inputs.run_id }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = Number(process.env.RUN_ID);
            if (!Number.isFinite(runId) || runId <= 0) {
              core.info(`Invalid run_id input: ${process.env.RUN_ID}`);
              core.setOutput('pr_number', '');
              return;
            }

            const runResponse = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: runId,
            });
            const run = runResponse.data;

            function resolved(prNumber, source) {
              const value = String(prNumber);
              core.info(`Resolved PR #${value} via ${source}.`);
              core.setOutput('pr_number', value);
            }

            function unresolved(reason) {
              core.info(`No PR resolved: ${reason}`);
              core.setOutput('pr_number', '');
            }

            const payloadPr = run.pull_requests?.[0]?.number;
            if (payloadPr) {
              resolved(payloadPr, 'workflow payload');
              return;
            }

            if (run.head_sha) {
              try {
                const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: run.head_sha,
                });
                const openPr = associated.data.find((pr) => pr.state === 'open');
                const commitPr = openPr?.number || associated.data[0]?.number;
                if (commitPr) {
                  resolved(commitPr, 'commit SHA association');
                  return;
                }
              } catch (error) {
                core.info(`Commit SHA association lookup failed: ${error.message}`);
              }
            } else {
              core.info('Skipping commit SHA association lookup (no head SHA).');
            }

            const headOwner = run.head_repository?.owner?.login;
            const headBranch = run.head_branch;
            if (headOwner && headBranch) {
              try {
                const byHead = await github.rest.pulls.list({
                  owner,
                  repo,
                  state: 'open',
                  head: `${headOwner}:${headBranch}`,
                  per_page: 1,
                });
                const headPr = byHead.data[0]?.number;
                if (headPr) {
                  resolved(headPr, 'head repo/branch');
                  return;
                }
              } catch (error) {
                core.info(`Head repo/branch lookup failed: ${error.message}`);
              }
            } else {
              core.info('Skipping head repo/branch lookup (missing head owner or branch).');
            }

            unresolved('workflow payload, commit SHA, and head repo/branch lookups all failed.');

      - name: Create or update PR comment
        if: ${{ steps.resolve_pr.outputs.pr_number != '' }}
        env:
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          MARKER: ${{ inputs.marker }}
          SUMMARY_PATH: ${{ inputs.artifact_dir }}/${{ inputs.summary_file }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number(process.env.PR_NUMBER);

            if (!fs.existsSync(process.env.SUMMARY_PATH)) {
              core.info(`Summary artifact file not found at ${process.env.SUMMARY_PATH}.`);
              return;
            }

            const summaryMarkdown = fs.readFileSync(process.env.SUMMARY_PATH, 'utf8').trim();
            const body = `${process.env.MARKER}\n${summaryMarkdown}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user &&
                comment.user.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(process.env.MARKER),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Log unresolved PR
        if: ${{ steps.resolve_pr.outputs.pr_number == '' }}
        run: echo "No pull request could be resolved. Skipping comment."
