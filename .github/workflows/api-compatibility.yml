name: API Compatibility

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      baseline_version:
        description: "Baseline release version (optional, defaults to latest SemVer tag)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: api-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-compatibility:
    name: Compare Public API Against Release
    runs-on: ubuntu-latest
    env:
      HAS_BREAKING_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'breaking-change') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: gradle

      - name: Resolve baseline version
        id: baseline
        shell: bash
        run: |
          set -euo pipefail

          input_version="${{ github.event.inputs.baseline_version || '' }}"
          if [[ -n "${input_version}" ]]; then
            baseline_version="${input_version}"
          else
            baseline_version=$(
              git tag --sort=-version:refname \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | head -n 1 \
                | tr -d '\r' \
                | xargs \
                || true
            )
          fi

          if [[ -z "${baseline_version:-}" ]]; then
            echo "Unable to resolve baseline release version from tags." >&2
            exit 1
          fi

          echo "baseline_version=${baseline_version}" >> "$GITHUB_OUTPUT"

      - name: Run API compatibility check
        id: compatibility
        continue-on-error: true
        shell: bash
        run: |
          set +e
          set -o pipefail
          ./gradlew apiCompatibilityCheck \
            -PapiCompatibilityBaselineVersion="${{ steps.baseline.outputs.baseline_version }}" \
            --no-daemon 2>&1 | tee api-compatibility.log
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"

      - name: API compatibility summary
        id: summary
        if: always()
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXIT_CODE: ${{ steps.compatibility.outputs.exit_code }}
        run: |
          set -euo pipefail

          result="compatible"
          binary_change_detected="false"
          source_change_detected="false"
          any_change_detected="false"

          if [[ -f api-compatibility.log ]] && grep -q "Detected binary changes\." api-compatibility.log; then
            binary_change_detected="true"
          fi

          if [[ -f api-compatibility.log ]] && grep -q "Detected source incompatible changes\." api-compatibility.log; then
            source_change_detected="true"
          fi

          if [[ "${binary_change_detected}" == "true" || "${source_change_detected}" == "true" ]]; then
            any_change_detected="true"
          fi

          if [[ -z "${EXIT_CODE}" ]]; then
            result="check did not run (missing exit code)"
          elif [[ "${EXIT_CODE}" != "0" ]]; then
            if [[ "${HAS_BREAKING_LABEL}" == "true" && "${any_change_detected}" == "true" ]]; then
              result="incompatible (breaking-change label present, allowed)"
            elif [[ "${HAS_BREAKING_LABEL}" == "true" ]]; then
              result="failed (breaking-change label present, but no API break detected)"
            else
              result="incompatible (breaking-change label missing)"
            fi
          fi

          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            {
              echo "## API Compatibility"
              echo "- Result: ${result}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "result=${result}" >> "$GITHUB_OUTPUT"
          echo "binary_change_detected=${binary_change_detected}" >> "$GITHUB_OUTPUT"
          echo "source_change_detected=${source_change_detected}" >> "$GITHUB_OUTPUT"

      - name: Enforce API compatibility policy
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.compatibility.outputs.exit_code }}
        run: |
          set -euo pipefail
          if [[ -z "${EXIT_CODE}" ]]; then
            echo "API compatibility check did not run or did not report an exit code."
            exit 1
          fi

          if [[ "${EXIT_CODE}" == "0" ]]; then
            exit 0
          fi

          if [[ "${HAS_BREAKING_LABEL}" == "true" ]]; then
            if [[ -f api-compatibility.log ]] && grep -Eq "Detected binary changes\.|Detected source incompatible changes\." api-compatibility.log; then
              exit 0
            fi
            echo "API compatibility task failed for a non-compatibility reason even though breaking-change label is present."
            exit 1
          fi

          echo "API compatibility check failed without breaking-change label."
          exit 1
