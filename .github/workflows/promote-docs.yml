name: Promote Docs

on:
  workflow_dispatch:
    inputs:
      # Auto-generated from .version by sync-version-file.yml
      # VERSION_INPUT_BEGIN
      version_preview:
        description: "Version from .version (read-only preview)"
        required: true
        type: choice
        options:
          - "2.3.0"
        default: "2.3.0"
      # VERSION_INPUT_END
      docs_repo_ref:
        description: "charts-docs ref to dispatch promote workflow on"
        required: false
        default: main
        type: string
      release_notes:
        description: "Optional registry notes for charts-docs entry"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: promote-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promote-docs:
    name: Resolve version and dispatch charts-docs promotion
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'HDCharts' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"
          cache: gradle

      - name: Resolve release version from Axion
        id: version
        shell: bash
        run: |
          set -euo pipefail
          release_version="$(bash .github/scripts/resolve-release-version.sh)"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "Resolved docs release version: ${release_version}"

      - name: Validate charts-docs workflow token
        shell: bash
        env:
          CHARTS_DOCS_WORKFLOW_TOKEN: ${{ secrets.CHARTS_DOCS_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CHARTS_DOCS_WORKFLOW_TOKEN:-}" ]]; then
            echo "Missing required secret: CHARTS_DOCS_WORKFLOW_TOKEN." >&2
            echo "Cross-repo workflow dispatch to HDCharts/charts-docs cannot use GITHUB_TOKEN." >&2
            exit 1
          fi

      - name: Dispatch charts-docs promote workflow
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          DOCS_REPO_REF: ${{ github.event.inputs.docs_repo_ref }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        with:
          github-token: ${{ secrets.CHARTS_DOCS_WORKFLOW_TOKEN }}
          script: |
            const releaseVersion = process.env.RELEASE_VERSION;
            const docsRepoRef = process.env.DOCS_REPO_REF || 'main';
            const releaseNotes = process.env.RELEASE_NOTES || '';
            const sourceRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.actions.createWorkflowDispatch({
              owner: 'HDCharts',
              repo: 'charts-docs',
              workflow_id: 'promote-docs.yml',
              ref: docsRepoRef,
              inputs: {
                release_version: releaseVersion,
                release_notes: releaseNotes,
                source_repository: `${context.repo.owner}/${context.repo.repo}`,
                source_sha: context.sha,
                source_run_url: sourceRunUrl,
              },
            });
            core.info(`Dispatched charts-docs promote-docs.yml for ${releaseVersion} on ref ${docsRepoRef}`);
