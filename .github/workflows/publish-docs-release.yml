name: Publish Docs Release

on:
  workflow_dispatch:
    inputs:
      # Auto-generated from .version by sync-version-file.yml
      # VERSION_INPUT_BEGIN
      version_preview:
        description: "Version from .version (read-only preview)"
        required: true
        type: choice
        options:
          - ""
        default: ""
      # VERSION_INPUT_END
      allow_overwrite_release:
        description: "Allow overwrite of existing release assets"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: docs-release-s3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-docs-release:
    name: Build and Publish docs/static release to S3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'HDCharts' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Resolve release version from Axion
        id: version
        shell: bash
        run: |
          set -euo pipefail
          release_version="$(bash .github/scripts/resolve-release-version.sh)"
          echo "charts_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "Config chartsVersion: ${release_version}"

      - name: Build docs static assets
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.charts_version }}
        run: |
          set -euo pipefail
          ./gradlew generateDocs -PchartsReleaseVersion="${CURRENT_VERSION}" --no-daemon --stacktrace --build-cache

      - name: Validate required docs static files
        shell: bash
        run: |
          set -euo pipefail
          charts_version="${{ steps.version.outputs.charts_version }}"
          required_files=(
            "docs/static/api/${charts_version}/index.html"
            "docs/static/demo/${charts_version}/index.html"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file" >&2
              exit 1
            fi
          done

      - name: Checkout charts-docs repository
        uses: actions/checkout@v6
        with:
          repository: HDCharts/charts-docs
          fetch-depth: 1
          path: charts-docs-repo

      - name: Validate release version exists in charts-docs registry
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.charts_version }}
        run: |
          set -euo pipefail
          registry_path="charts-docs-repo/registry/versions.json"
          if [[ ! -f "${registry_path}" ]]; then
            echo "Missing charts-docs registry: ${registry_path}" >&2
            exit 1
          fi

          if ! jq -e --arg expected "${EXPECTED_VERSION}" \
            'any((.versions // [])[]?; .id == $expected)' "${registry_path}" >/dev/null; then
            available_versions="$(jq -r '[(.versions // [])[]? | .id | select(type == "string" and . != "")] | join(", ")' "${registry_path}")"
            echo "Release version ${EXPECTED_VERSION} is not present in charts-docs registry." >&2
            echo "Available registry versions: ${available_versions:-"(none)"}" >&2
            exit 1
          fi

      - name: Validate docs release link contract
        shell: bash
        run: |
          set -euo pipefail
          bash charts-docs-repo/scripts/test-docs-release-links-contract.sh

      - name: Publish release assets to S3
        id: publish
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.charts_version }}
          DOCS_STATIC_BUCKET: ${{ vars.DOCS_STATIC_BUCKET }}
          ALLOW_OVERWRITE_RELEASE_INPUT: ${{ github.event.inputs.allow_overwrite_release }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/publish-docs-to-s3.sh release
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront cache
        if: ${{ steps.publish.outputs.published == 'true' }}
        env:
          CURRENT_VERSION: ${{ steps.version.outputs.charts_version }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/invalidate-docs-cloudfront.sh release
