name: PR API Compatibility Summary Comment

on:
  workflow_run:
    workflows: ["API Compatibility"]
    types: [completed]

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    steps:
      - name: Download summary artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: api-compatibility-summary
          path: ./api-summary
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update PR comment
        uses: actions/github-script@v7
        env:
          MARKER: "<!-- api-compatibility-summary -->"
          SUMMARY_PATH: "api-summary/api-compatibility-summary.md"
        with:
          script: |
            const fs = require('fs');
            const run = context.payload.workflow_run;
            const { owner, repo } = context.repo;

            async function resolvePrNumber() {
              const payloadPr = run.pull_requests?.[0]?.number;
              if (payloadPr) {
                core.info(`Resolved PR #${payloadPr} via workflow payload.`);
                return payloadPr;
              }

              if (run.head_sha) {
                try {
                  const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner,
                    repo,
                    commit_sha: run.head_sha,
                  });
                  const openPr = associated.data.find((pr) => pr.state === 'open');
                  const commitPr = openPr?.number || associated.data[0]?.number;
                  if (commitPr) {
                    core.info(`Resolved PR #${commitPr} via commit SHA association.`);
                    return commitPr;
                  }
                } catch (error) {
                  core.info(`Commit SHA association lookup failed: ${error.message}`);
                }
              } else {
                core.info('Skipping commit SHA association lookup (no head SHA).');
              }

              const headOwner = run.head_repository?.owner?.login;
              const headBranch = run.head_branch;
              if (headOwner && headBranch) {
                try {
                  const byHead = await github.rest.pulls.list({
                    owner,
                    repo,
                    state: 'open',
                    head: `${headOwner}:${headBranch}`,
                    per_page: 1,
                  });
                  const headPr = byHead.data[0]?.number;
                  if (headPr) {
                    core.info(`Resolved PR #${headPr} via head repo/branch.`);
                    return headPr;
                  }
                } catch (error) {
                  core.info(`Head repo/branch lookup failed: ${error.message}`);
                }
              } else {
                core.info('Skipping head repo/branch lookup (missing head owner or branch).');
              }

              return null;
            }

            const issue_number = await resolvePrNumber();
            if (!issue_number) {
              core.info('No pull request could be resolved. Skipping comment.');
              return;
            }

            if (!fs.existsSync(process.env.SUMMARY_PATH)) {
              core.info(`Summary artifact file not found at ${process.env.SUMMARY_PATH}.`);
              return;
            }

            const summaryMarkdown = fs.readFileSync(process.env.SUMMARY_PATH, 'utf8').trim();
            const body = `${process.env.MARKER}\n${summaryMarkdown}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user &&
                comment.user.login === 'github-actions[bot]' &&
                typeof comment.body === 'string' &&
                comment.body.includes(process.env.MARKER),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
