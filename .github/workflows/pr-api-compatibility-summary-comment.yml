name: PR API Compatibility Summary Comment

on:
  workflow_run:
    workflows: ["API Compatibility"]
    types: [completed]

jobs:
  comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    uses: ./.github/workflows/pr-summary-comment.yml
    with:
      run_id: ${{ github.event.workflow_run.id }}
      artifact_name: api-compatibility-summary
      artifact_dir: api-summary
      summary_file: api-compatibility-summary.md
      marker: <!-- api-compatibility-summary -->
    secrets: inherit
